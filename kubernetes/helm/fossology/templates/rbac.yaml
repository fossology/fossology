{{- if .Values.rbac.create }}
# ServiceAccount for the scheduler pod — used by config-sync sidecar
# to watch worker pod state via the Kubernetes API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fossology.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "fossology.labels" . | indent 4 }}
    app.kubernetes.io/component: scheduler
---
# Role: minimal permissions — read-only access to pods in this namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fossology.fullname" . }}-config-sync
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "fossology.labels" . | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fossology.fullname" . }}-config-sync
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "fossology.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fossology.fullname" . }}-config-sync
subjects:
  - kind: ServiceAccount
    name: {{ include "fossology.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
