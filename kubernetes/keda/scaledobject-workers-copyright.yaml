# Per-agent-type ScaledObject for copyright workers.
# Requires PR3 (scheduler host capability extension) for agent routing.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fossology-workers-copyright
  namespace: fossology
  labels:
    app.kubernetes.io/name: fossology
    app.kubernetes.io/component: worker-copyright
spec:
  scaleTargetRef:
    kind: StatefulSet
    name: fossology-workers-copyright
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: postgresql
      metadata:
        connectionFromEnv: FOSSOLOGY_DB_CONNECTION
        # Count pending jobs for copyright-family agents
        query: >-
          SELECT COUNT(*) FROM jobqueue
          WHERE jq_endtime IS NULL
          AND jq_starttime IS NULL
          AND jq_type IN ('copyright', 'ecc', 'keyword', 'ipra')
        targetQueryValue: "5"
      authenticationRef:
        name: fossology-db-auth
