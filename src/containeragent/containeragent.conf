; Scheduler configuration for the container analysis agent
[default]

; name: The name of the agent from the agent table
name = containeragent

; command: The command the scheduler runs when creating an instance of this agent.
command = containeragent

; max: Maximum number of concurrent instances (-1 = unlimited)
max = -1

; special: Scheduler directives.
; EXCLUSIVE means the agent cannot run concurrently with any other agent.
special[] =
