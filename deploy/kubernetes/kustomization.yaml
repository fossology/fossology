  - configmap.yaml
  - secret.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - repository-pvc.yaml
  - fossology-deployment.yaml
  - fossology-service.yaml
labels:
  - pairs:
      app.kubernetes.io/name: fossology
